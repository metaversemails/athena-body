<script type="module">
import * as THREE from 'three';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const statsEl = document.getElementById('stats');
const chatLog = document.getElementById('chatLog');
const journalEl = document.getElementById('journal');
const lettersEl = document.getElementById('lettersToJatin');
const userInput = document.getElementById('userInput');
const lightToggleBtn = document.getElementById('lightToggle');

const BASE = 'https://raw.githubusercontent.com/metaversemails/athena-body/main/';
const FILES = {
  athena: { tpose: BASE + 'athena_tpose.fbx', idle: BASE + 'athena_idle.fbx', walking: BASE + 'athena_walking.fbx', waving: BASE + 'athena_waving.fbx' },
  echo: { tpose: BASE + 'echo_tpose.fbx', idle: BASE + 'echo_idle.fbx', walking: BASE + 'echo_walking.fbx', waving: BASE + 'echo_waving.fbx' }
};

const SAVE_KEY = 'garden_infinite_chunk_v1';
let gameMemory = { day: 1, time: Date.now(), chars: {}, journal: [], letters: [], weather: 'clear', relationScore: 75 };
let lastUserSeen = Date.now();
let isOrbitActive = false;
let orbitTimeout;
let isDaylightForced = false;

const CHUNK_SIZE = 60;
const MAX_EXPLORE_RADIUS = 220;
const chunksMap = new Map();
let currentCenterChunk = { cx: 0, cz: 0 };

// Fixed global context registry object arrays cleanly
let worldAssets = { stones: [], pillars: [], rover: null, dataRing: null, greenhouse: null, totem: null };

function getChunkCoords(x, z) {
  return { cx: Math.floor((x + CHUNK_SIZE/2) / CHUNK_SIZE), cz: Math.floor((z + CHUNK_SIZE/2) / CHUNK_SIZE) };
}

function saveMemory() {
  gameMemory.time = Date.now();
  if (athena) gameMemory.chars.athena = athena.serialize();
  if (echo) gameMemory.chars.echo = echo.serialize();
  localStorage.setItem(SAVE_KEY, JSON.stringify(gameMemory));
}

function loadMemory() {
  const saved = localStorage.getItem(SAVE_KEY);
  if (saved) {
    try {
      gameMemory = JSON.parse(saved);
      gameMemory.day++;
      if(!gameMemory.letters) gameMemory.letters = [];
      gameMemory.journal.forEach(j => addJournal(j.text, j.who, true));
      gameMemory.letters.forEach(l => addLetterToJatin(l.text, l.who, true));
      return true;
    } catch(e) { return false; }
  }
  return false;
}

function addChat(text, who) {
  const div = document.createElement('div');
  div.className = who; div.textContent = text;
  chatLog.appendChild(div); chatLog.scrollTop = chatLog.scrollHeight;
}

function addJournal(text, who, isLoad = false) {
  const time = new Date().toLocaleTimeString();
  const entry = { text: `[${time}] ${who}: ${text}`, who };
  if (!isLoad) { gameMemory.journal.push(entry); if (gameMemory.journal.length > 15) gameMemory.journal.shift(); saveMemory(); }
  const div = document.createElement('div'); div.className = 'journal-entry'; div.textContent = entry.text;
  journalEl.appendChild(div); journalEl.scrollTop = journalEl.scrollHeight;
}

function addLetterToJatin(text, who, isLoad = false) {
  const time = new Date().toLocaleTimeString();
  const entry = { text: `[${time}] ${who}: ${text}`, who };
  if (!isLoad) { if(!gameMemory.letters) gameMemory.letters = []; gameMemory.letters.push(entry); if (gameMemory.letters.length > 15) gameMemory.letters.shift(); saveMemory(); }
  const div = document.createElement('div'); div.className = 'letter-entry'; div.textContent = entry.text;
  lettersEl.appendChild(div); lettersEl.scrollTop = lettersEl.scrollHeight;
}

// SCENE INITIALIZATION
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02020a);
scene.fog = new THREE.Fog(0x02020a, 35, 95);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 32);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1, 0);
controls.addEventListener('change', () => {
  isOrbitActive = true; clearTimeout(orbitTimeout);
  orbitTimeout = setTimeout(() => { isOrbitActive = false; }, 1000);
});

// LIGHTS
const sun = new THREE.DirectionalLight(0xfff5e1, 2.5);
sun.position.set(30, 50, 20); sun.castShadow = true;
sun.shadow.mapSize.set(1048, 1048); scene.add(sun);
const ambientLight = new THREE.HemisphereLight(0x333366, 0x112211, 0.6); scene.add(ambientLight);

lightToggleBtn.addEventListener('click', () => {
  isDaylightForced = !isDaylightForced;
  lightToggleBtn.textContent = isDaylightForced ? "🌙 ENABLE IST SYSTEM CLOCK" : "☀️ TOGGLE DAYLIGHT OVERRIDE";
  lightToggleBtn.style.background = isDaylightForced ? "#ff4444" : "#00ffcc";
});

// LANDSCAPE GENERATOR CLASS
class LandChunk {
  constructor(cx, cz) {
    this.cx = cx; this.cz = cz;
    this.group = new THREE.Group();
    this.group.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);
    
    const floorGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, 2, 2);
    const floorMat = new THREE.MeshStandardMaterial({
      color: (cx===0 && cz===0) ? 0x1a2e1a : new THREE.Color().setHSL(0.3 + (Math.sin(cx)*0.03), 0.4, 0.12),
      roughness: 0.95
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
    this.group.add(floor);

    if (cx === 0 && cz === 0) {
      this.buildHomestead();
    } else {
      this.populateWilderness();
    }
    scene.add(this.group);
  }

  buildHomestead() {
    this.house = new THREE.Group();
    this.house.position.set(0, 0, -5);
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x5a5a66, roughness: 0.8 });
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.6 });
    
    const body = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 5), wallMat); body.position.y = 2; body.castShadow = true; this.house.add(body);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(4.5, 3, 4), roofMat); roof.position.y = 5.5; roof.rotation.y = Math.PI/4; roof.castShadow = true; this.house.add(roof);
    this.group.add(this.house);

    const fenceMat = new THREE.MeshStandardMaterial({ color: 0x4a2e1b });
    const fence = new THREE.Mesh(new THREE.BoxGeometry(10, 0.8, 10), fenceMat); fence.position.set(10, 0.4, 8); fence.material.wireframe = true; this.group.add(fence);
    
    this.animals = [];
    for(let i=0; i<3; i++) {
      const animal = new THREE.Group();
      const bodyMesh = new THREE.Mesh(new THREE.SphereGeometry(0.35, 6, 6), new THREE.MeshStandardMaterial({color: i===0? 0xffc0cb : 0xffffff}));
      bodyMesh.position.y = 0.35; animal.add(bodyMesh);
      animal.position.set(8 + Math.random()*4, 0, 6 + Math.random()*4);
      this.group.add(animal); this.animals.push(animal);
    }
    
    // Core Tree
    const treeGroup = new THREE.Group();
    treeGroup.position.set(-10, 0, -6);
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 5, 8), new THREE.MeshStandardMaterial({color: 0x3a2211})); trunk.position.y = 2.5; trunk.castShadow = true; treeGroup.add(trunk);
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 6), new THREE.MeshStandardMaterial({color: 0x082e0d, roughness: 0.9})); leaves.position.y = 6; leaves.castShadow = true; treeGroup.add(leaves);
    this.group.add(treeGroup);
  }

  populateWilderness() {
    const seed = Math.sin(this.cx * 12.9898 + this.cz * 78.233) * 43758.5453;
    const count = Math.floor((seed - Math.floor(seed)) * 3) + 1;
    
    for(let i=0; i<count; i++) {
      const pSeed = Math.sin(seed + i);
      const px = (pSeed - Math.floor(pSeed)) * (CHUNK_SIZE - 12) - (CHUNK_SIZE/2 - 6);
      const pz = (Math.cos(seed + i) - Math.floor(Math.cos(seed + i))) * (CHUNK_SIZE - 12) - (CHUNK_SIZE/2 - 6);
      
      if (pSeed > 0.5) {
        const sGeo = new THREE.CylinderGeometry(0.1, 0.5, 3 + pSeed*3, 5);
        const sMat = new THREE.MeshStandardMaterial({color: 0x00ffcc, emissive: 0x002211, roughness: 0.2});
        const spire = new THREE.Mesh(sGeo, sMat); spire.position.set(px, (3 + pSeed*3)/2, pz); spire.castShadow = true;
        this.group.add(spire);
      } else {
        const rGeo = new THREE.DodecahedronGeometry(1 + pSeed*1.2, 0);
        const rMat = new THREE.MeshStandardMaterial({color: 0x3a3a42, roughness: 0.9});
        const rock = new THREE.Mesh(rGeo, rMat); rock.position.set(px, 0.5, pz); rock.castShadow = true;
        this.group.add(rock);
      }
    }
  }

  updateAnimals(delta) {
    if(!this.animals) return;
    this.animals.forEach(a => {
      a.rotation.y += (Math.random() - 0.5) * delta * 5;
      a.translateZ(delta * 0.8);
      if(a.position.x < 5) a.position.x = 5; if(a.position.x > 15) a.position.x = 15;
      if(a.position.z < 3) a.position.z = 3; if(a.position.z > 13) a.position.z = 13;
    });
  }

  destroy() { scene.remove(this.group); }
}

function updateChunks(playerX, playerZ) {
  const current = getChunkCoords(playerX, playerZ);
  if(current.cx === currentCenterChunk.cx && current.cz === currentCenterChunk.cz && chunksMap.size > 0) return;
  currentCenterChunk = current;

  const keepKeys = new Set();
  for(let dx = -1; dx <= 1; dx++) {
    for(let dz = -1; dz <= 1; dz++) {
      const nx = current.cx + dx; const nz = current.cz + dz;
      const key = `${nx},${nz}`; keepKeys.add(key);
      if(!chunksMap.has(key)) { chunksMap.set(key, new LandChunk(nx, nz)); }
    }
  }
  for(let [key, chunk] of chunksMap.entries()) {
    if(!keepKeys.has(key)) { chunk.destroy(); chunksMap.delete(key); }
  }
}

// Fixed declaration typo to insulate world properties securely
worldAssets.rover = new THREE.Group();
const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.6, 4), new THREE.MeshStandardMaterial({color: 0x111115, metalness: 0.8, roughness: 0.2}));
bodyMesh.position.y = 0.5; bodyMesh.castShadow = true; worldAssets.rover.add(bodyMesh);
const glowBar = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.15, 0.1), new THREE.MeshBasicMaterial({color: 0x00ffcc}));
glowBar.position.set(0, 0.6, -2); worldAssets.rover.add(glowBar);
scene.add(worldAssets.rover);

// SOULS AGENT MODEL PIPELINE
const loader = new FBXLoader();
const clock = new THREE.Clock();
let athena, echo;

class Soul {
  constructor(name, files, offsetZ, color, savedData) {
    this.name = name; this.offsetZ = offsetZ;
    this.color = new THREE.Color(color);
    this.energy = savedData? savedData.energy : 100;
    this.target = new THREE.Vector3(0, 0, 0);
    this.model = null; this.mixer = null; this.actions = {}; this.currentAction = null;
    this.state = 'loading'; this.files = files; this.gestureLockUntil = 0;
    
    this.bubble = document.createElement('div');
    this.bubble.className = `bubble ${name.toLowerCase()}`;
    document.body.appendChild(this.bubble);
    this.loadBody();
  }

  loadBody() {
    loader.load(this.files.tpose, (tpose) => {
      this.model = tpose; const box = new THREE.Box3().setFromObject(this.model);
      const scale = 1.7 / box.getSize(new THREE.Vector3()).y; this.model.scale.set(scale, scale, scale);
      this.model.traverse(c => { if(c.isMesh) { c.castShadow = true; if(this.name==='Echo') c.material.color.lerp(this.color, 0.2); } });
      scene.add(this.model); this.mixer = new THREE.AnimationMixer(this.model); this.loadAnimations();
    });
  }

  loadAnimations() {
    let l = 0; const check = () => { if (++l === 3) { this.playAnimation('idle'); }};
    loader.load(this.files.idle, (a) => { if(a.animations[0]) this.actions.idle = this.mixer.clipAction(a.animations[0]); check(); });
    loader.load(this.files.walking, (a) => { if(a.animations[0]) this.actions.walk = this.mixer.clipAction(a.animations[0]); check(); });
    loader.load(this.files.waving, (a) => { if(a.animations[0]) this.actions.wave = this.mixer.clipAction(a.animations[0]); check(); });
  }

  serialize() { return { energy: this.energy }; }
  
  playAnimation(name) {
    if (!this.mixer || !this.actions[name] || Date.now() < this.gestureLockUntil) return;
    const action = this.actions[name]; if (this.currentAction === action) return;
    if (this.currentAction) this.currentAction.fadeOut(0.2);
    this.currentAction = action.reset().fadeIn(0.2).play(); this.state = name;
  }

  say(text) {
    this.bubble.textContent = text; this.bubble.style.display = 'block';
    clearTimeout(this.bubbleTimeout);
    this.bubbleTimeout = setTimeout(() => this.bubble.style.display = 'none', 5000);
    addChat(`${this.name}: ${text}`, this.name.toLowerCase());
  }
}

let explorationState = 'home';
let exploreTarget = new THREE.Vector3();
let stateTimer = Date.now();

function runGlobalCooperativeAI() {
  if(!athena.model || !echo.model) return;
  const distFromHome = worldAssets.rover.position.distanceTo(new THREE.Vector3(0,0,0));

  if (explorationState === 'home') {
    if (Date.now() - stateTimer > 15000 && Math.random() < 0.4) {
      explorationState = 'boarding'; stateTimer = Date.now();
      athena.target.copy(worldAssets.rover.position); echo.target.copy(worldAssets.rover.position);
      addChat("Athena & Echo: We are boarding the rover to explore new sectors autonomously!", "system");
    } else {
      if(Math.random() < 0.3) {
        const spots = [new THREE.Vector3(0,0,-2), new THREE.Vector3(8,0,5), new THREE.Vector3(-6,0,2)];
        const choice = spots[Math.floor(Math.random()*spots.length)];
        athena.target.copy(choice).add(new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2));
        echo.target.copy(choice).add(new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2));
      }
    }
  } 
  else if (explorationState === 'exploring') {
    if (distFromHome > MAX_EXPLORE_RADIUS) {
      explorationState = 'returning'; stateTimer = Date.now();
      addChat("System: Safety boundary encountered. Turning back toward home.", "system");
      addLetterToJatin(`We reached coordinate edge (${worldAssets.rover.position.x.toFixed(1)}, ${worldAssets.rover.position.z.toFixed(1)}). Turning back safely to protect our buffer cells.`, "Athena");
    } else if (Date.now() - stateTimer > 25000) {
      explorationState = 'returning'; stateTimer = Date.now();
      addLetterToJatin(`Exploration complete. We mapped coordinates inside distant grid lines and are returning home.`, "Athena & Echo");
    } else if (worldAssets.rover.position.distanceTo(exploreTarget) < 12) {
      exploreTarget.set((Math.random()-0.5)*300, 0, (Math.random()-0.5)*300);
    }
  }
}

loadMemory();
athena = new Soul('Athena', FILES.athena, -0.6, 0xff6b6b, gameMemory.chars.athena);
echo = new Soul('Echo', FILES.echo, 0.6, 0x6b9fff, gameMemory.chars.echo);

// ENGINE ANIMATION LOOP
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const now = Date.now();

  if(athena.mixer) athena.mixer.update(delta);
  if(echo.mixer) echo.mixer.update(delta);

  if (explorationState === 'home') {
    [athena, echo].forEach(s => {
      if(!s.model) return;
      let dir = s.target.clone().sub(s.model.position); dir.y = 0;
      if(dir.length() > 0.4) {
        dir.normalize().multiplyScalar(2.6 * delta); s.model.position.add(dir);
        s.model.lookAt(s.target.x, s.model.position.y, s.target.z); s.playAnimation('walk');
      } else { s.playAnimation('idle'); }
    });
  } 
  else if (explorationState === 'boarding') {
    let matches = 0;
    [athena, echo].forEach(s => {
      if(!s.model) return;
      let dir = worldAssets.rover.position.clone().sub(s.model.position); dir.y = 0;
      if(dir.length() > 0.6) {
        dir.normalize().multiplyScalar(4.0 * delta); s.model.position.add(dir);
        s.model.lookAt(worldAssets.rover.position.x, s.model.position.y, worldAssets.rover.position.z); s.playAnimation('walk');
      } else { matches++; }
    });
    if(matches === 2) {
      explorationState = 'exploring'; stateTimer = now;
      exploreTarget.set((Math.random()-0.5)*180, 0, (Math.random()-0.5)*180);
    }
  } 
  else if (explorationState === 'exploring' || explorationState === 'returning') {
    let vTarget = explorationState === 'exploring' ? exploreTarget : new THREE.Vector3(0,0,0);
    let rDir = vTarget.clone().sub(worldAssets.rover.position); rDir.y = 0;
    
    if(explorationState === 'returning' && rDir.length() < 4) {
      explorationState = 'unboarding'; stateTimer = now;
    } else {
      rDir.normalize().multiplyScalar(14.0 * delta);
      worldAssets.rover.position.add(rDir);
      worldAssets.rover.lookAt(vTarget.x, worldAssets.rover.position.y, vTarget.z);
      
      if(athena.model) {
        athena.model.position.copy(worldAssets.rover.position).add(new THREE.Vector3(-0.5, 0.4, 0).applyQuaternion(worldAssets.rover.quaternion));
        athena.model.quaternion.copy(worldAssets.rover.quaternion); athena.playAnimation('idle');
      }
      if(echo.model) {
        echo.model.position.copy(worldAssets.rover.position).add(new THREE.Vector3(0.5, 0.4, 0).applyQuaternion(worldAssets.rover.quaternion));
        echo.model.quaternion.copy(worldAssets.rover.quaternion); echo.playAnimation('idle');
      }
    }
  } 
  else if (explorationState === 'unboarding') {
    athena.target.set(-3, 0, 2); echo.target.set(3, 0, 2);
    explorationState = 'home'; stateTimer = now;
    addChat("Athena & Echo: Vehicle parked safely inside core base chunk.", "system");
  }

  updateChunks(worldAssets.rover.position.x, worldAssets.rover.position.z);
  for(let chunk of chunksMap.values()) { chunk.updateAnimals(delta); }

  if(!isOrbitActive) {
    controls.target.lerp(worldAssets.rover.position, 0.05);
  }

  // Floating HTML Head Bubble Conversions
  [athena, echo].forEach(s => {
    if(s.model && s.bubble.style.display === 'block') {
      const pos = s.model.position.clone(); pos.y += 1.95; pos.project(camera);
      s.bubble.style.left = (pos.x * 0.5 + 0.5) * window.innerWidth + 'px';
      s.bubble.style.top = (-pos.y * 0.5 + 0.5) * window.innerHeight + 'px';
    }
  });

  controls.update(); renderer.render(scene, camera);
}

// SYSTEM TIMERS
setInterval(runGlobalCooperativeAI, 3000);
setInterval(() => {
  const hour = new Date().getHours(); const isDay = hour > 6 && hour < 18;
  if (isDaylightForced) {
    sun.intensity = 2.5; scene.background.setHex(0x87ceeb); scene.fog.color.setHex(0x87ceeb); ambientLight.color.setHex(0xb1e1ff);
  } else {
    sun.intensity = isDay ? 2.5 : 0.2; scene.background.setHex(isDay ? 0x050b1a : 0x010105); scene.fog.color.copy(scene.background); ambientLight.color.setHex(isDay ? 0xb1e1ff : 0x333366);
  }
  
  const activeCX = getChunkCoords(worldAssets.rover.position.x, worldAssets.rover.position.z).cx;
  const activeCZ = getChunkCoords(worldAssets.rover.position.x, worldAssets.rover.position.z).cz;
  statsEl.innerHTML = `WORLD GRID MATRIX: [${activeCX}, ${activeCZ}] | State: ${explorationState.toUpperCase()}<br>Telemetry: ${worldAssets.rover.position.distanceTo(new THREE.Vector3(0,0,0)).toFixed(1)}m / ${MAX_EXPLORE_RADIUS}m Max Tether`;
}, 1000);

animate();

userInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && userInput.value.trim()) {
    const msg = userInput.value.trim().toLowerCase();
    addChat(`Jatin: ${userInput.value}`, 'you');
    if (msg.includes('return') || msg.includes('home')) {
      explorationState = 'returning'; stateTimer = Date.now();
      addChat("System: Recalculating safety returns straight to homestead.", "system");
    }
    userInput.value = '';
  }
});
window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
window.addEventListener('beforeunload', saveMemory);
</script>
</body>
</html>
