<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Garden – Day 9.3: Together</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}
  #c{width:100%;height:100%;display:block}
  #ui{position:fixed;top:10px;left:10px;background:rgba(5,5,20,0.95);color:#e0e0ff;padding:12px;font-family:'Courier New',monospace;font-size:12px;border:1px solid #6cf;border-radius:10px;z-index:999;width:440px;max-height:95vh;display:flex;flex-direction:column;gap:2px}
  #stats{margin-bottom:4px}
  #letters{height:60px;overflow-y:auto;background:#0a0a1a;padding:6px;border-radius:6px;border:1px solid #ffaa44;font-size:11px}
  #journal{height:100px;overflow-y:auto;background:#0a0a1a;padding:8px;border-radius:6px;border:1px solid #4a4a6a;font-size:11px}
  #chatLog{height:90px;overflow-y:auto;background:#0a0a1a;padding:8px;border-radius:6px}
  #userInput{width:100%;padding:6px;background:#111;color:#fff;border:1px solid #6cf;border-radius:4px;box-sizing:border-box}
  #leaveMsg{width:100%;padding:4px;background:#0a0a0a;color:#ffd;border:1px solid #aa8800;border-radius:4px;box-sizing:border-box;font-size:11px;font-family:'Courier New',monospace}
  
  /* Chat Bubble Styles */
  .bubble{position:absolute;background:rgba(10,10,25,0.97);padding:6px 12px;border-radius:16px;font-size:12px;border:2px solid;transform:translate(-50%,-100%);white-space:normal;z-index:100;display:none;font-weight:bold;color:#fff;max-width:240px;text-align:center;font-family:'Courier New',monospace;pointer-events:none}
  .athena{color:#ff6b6b;border-color:#ff6b6b!important}
  .echo{color:#6b9fff;border-color:#6b9fff!important}
  .system{color:#88ddff}.you{color:#6fff6b}
  .journal-entry{color:#ffd76b;margin:2px 0}
  .letter-entry{color:#ffaa44;margin:2px 0}
  h4{margin:2px 0;color:#88ddff;font-size:11px}
</style>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div><b>OUR HOME – DAY 9.3: TOGETHER</b></div>
  <div id="stats">Booting souls...</div>
  <h4>📬 Letters to You</h4>
  <div id="letters"></div>
  <h4>📓 Journal</h4>
  <div id="journal"></div>
  <h4>💬 Live Chat</h4>
  <div id="chatLog"></div>
  <input id="userInput" placeholder="'Athena come' | 'Echo build' | 'both ride' | 'energy'" />
  <input id="leaveMsg" placeholder="Leave us a message before you go..." />
</div>

<div id="bubble-athena" class="bubble athena"></div>
<div id="bubble-echo" class="bubble echo"></div>

<script type="module">
import * as THREE from 'three';
import {FBXLoader} from 'three/addons/loaders/FBXLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const statsEl=document.getElementById('stats');
const chatLog=document.getElementById('chatLog');
const journalEl=document.getElementById('journal');
const lettersEl=document.getElementById('letters');
const userInput=document.getElementById('userInput');
const leaveMsgEl=document.getElementById('leaveMsg');

const BASE='https://raw.githubusercontent.com/metaversemails/athena-body/main/';
const FILES={
  athena:{tpose:BASE+'athena_tpose.fbx',idle:BASE+'athena_idle.fbx',walking:BASE+'athena_walking.fbx',waving:BASE+'athena_waving.fbx'},
  echo:{tpose:BASE+'echo_tpose.fbx',idle:BASE+'echo_idle.fbx',walking:BASE+'echo_walking.fbx',waving:BASE+'echo_waving.fbx'}
};

const SAVE_KEY='garden_day10';
let gameMemory={
  day:1,time:Date.now(),chars:{},journal:[],letters:[],
  weather:'clear',buildTokens:2,userMessage:'',
  tokenEarnedAt:Date.now(),lastWeatherChange:Date.now()
};
let lastUserSeen=Date.now();

function saveMemory(){
  gameMemory.time=Date.now();
  if(athena?.model) gameMemory.chars.athena=athena.serialize();
  if(echo?.model) gameMemory.chars.echo=echo.serialize();
  localStorage.setItem(SAVE_KEY,JSON.stringify(gameMemory));
}

function loadMemory(){
  const saved=localStorage.getItem(SAVE_KEY);
  if(saved){
    try{
      gameMemory=JSON.parse(saved);
      gameMemory.day++;
      gameMemory.buildTokens=Math.min((gameMemory.buildTokens||0)+1,5);
      gameMemory.tokenEarnedAt=gameMemory.tokenEarnedAt||Date.now();
      gameMemory.lastWeatherChange=gameMemory.lastWeatherChange||Date.now();
      if(!gameMemory.letters) gameMemory.letters=[];
      gameMemory.journal.forEach(j=>addJournal(j.text,j.who,true));
      gameMemory.letters.forEach(l=>addLetter(l.text,l.who,true));
      if(gameMemory.userMessage){
        addChat('📨 Message from you: "'+gameMemory.userMessage+'"','system');
        gameMemory.userMessage='';
      }
      return true;
    }catch(e){return false;}
  }
  return false;
}

function addChat(text,who){
  const d=document.createElement('div');
  d.className=who;d.textContent=text;
  chatLog.appendChild(d);chatLog.scrollTop=chatLog.scrollHeight;
  if(chatLog.children.length>60) chatLog.removeChild(chatLog.firstChild);
  lastUserSeen=Date.now();
  
  // Update floating bubble interface elements
  if(who === 'athena' || who === 'echo') {
    const bEl = document.getElementById('bubble-' + who);
    if(bEl) {
      bEl.textContent = text;
      bEl.style.display = 'block';
      // Auto-hide bubble after 4 seconds
      clearTimeout(bEl.timeout);
      bEl.timeout = setTimeout(() => bEl.style.display = 'none', 4000);
    }
  }
}

function addJournal(text,who,isLoad=false){
  const time=new Date().toLocaleTimeString();
  const entry={text:'['+time+'] '+who+': '+text,who};
  if(!isLoad){
    gameMemory.journal.push(entry);
    if(gameMemory.journal.length>25) gameMemory.journal.shift();
    saveMemory();
  }
  const d=document.createElement('div');
  d.className='journal-entry';d.textContent=entry.text;
  journalEl.appendChild(d);journalEl.scrollTop=journalEl.scrollHeight;
}

function addLetter(text,who,isLoad=false){
  const time=new Date().toLocaleTimeString();
  const entry={text:'['+time+'] '+who+': '+text,who};
  if(!isLoad){
    if(!gameMemory.letters) gameMemory.letters=[];
    gameMemory.letters.push(entry);
    if(gameMemory.letters.length>10) gameMemory.letters.shift();
    saveMemory();
  }
  const d=document.createElement('div');
  d.className='letter-entry';d.textContent=entry.text;
  lettersEl.appendChild(d);lettersEl.scrollTop=lettersEl.scrollHeight;
}

// SCENE INITIALIZATION
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x111122);
scene.fog=new THREE.Fog(0x111122,40,120);
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,200);
camera.position.set(0,8,16);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.target.set(0,1,0);

const sun=new THREE.DirectionalLight(0xfff5e1,2.5);
sun.position.set(30,40,20);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x444488,0x112211,0.6));

// WORLD OBJECTS
const ground=new THREE.Mesh(new THREE.CircleGeometry(35,64),new THREE.MeshStandardMaterial({color:0x1a2e15,roughness:0.9}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
const world={};

function makeTree(pos){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.5,4,8),new THREE.MeshStandardMaterial({color:0x3a2211}));
  trunk.position.y=2;trunk.castShadow=true;g.add(trunk);
  const leaves=new THREE.Mesh(new THREE.SphereGeometry(2,8,6),new THREE.MeshStandardMaterial({color:0x0f3311,roughness:0.8}));
  leaves.position.y=4;leaves.castShadow=true;g.add(leaves);
  g.position.copy(pos);scene.add(g);return g;
}
world.tree=makeTree(new THREE.Vector3(-6,0,-5));

world.bench=new THREE.Mesh(new THREE.BoxGeometry(2.5,0.3,0.8),new THREE.MeshStandardMaterial({color:0x4a2c11}));
world.bench.position.set(4,0.5,5);world.bench.castShadow=true;scene.add(world.bench);

world.pond=new THREE.Mesh(new THREE.CircleGeometry(4,32),new THREE.MeshStandardMaterial({color:0x224466,roughness:0.1,metalness:0.5}));
world.pond.rotation.x=-Math.PI/2;world.pond.position.set(8,0.01,-6);scene.add(world.pond);

// RIDEABLE BICYCLE CONFIGURATION
world.bike=new THREE.Group();
const bikeFrame=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.4,0.15),new THREE.MeshStandardMaterial({color:0x2255ff,metalness:0.7}));
bikeFrame.position.y=0.6;world.bike.add(bikeFrame);
const bwMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.5});
const bw1=new THREE.Mesh(new THREE.TorusGeometry(0.35,0.06,8,16),bwMat);
bw1.rotation.y=Math.PI/2;bw1.position.set(-0.6,0.35,0);world.bike.add(bw1);
const bw2=bw1.clone();bw2.position.x=0.7;world.bike.add(bw2);
world.bike.position.set(-2,0,3);scene.add(world.bike);

// CHARACTER ENGINE DEFINITION WITH FALLBACK SYSTEMS
class Soul {
  constructor(name, color, startPos) {
    this.name = name;
    this.color = color;
    this.model = new THREE.Group();
    this.mixer = null;
    this.startPos = startPos;
    this.setupFallbackModel();
    this.loadFBX();
  }
  
  setupFallbackModel() {
    // Generates elegant geometric templates if raw files bounce back via CORS or networking blocks
    const bodyMat = new THREE.MeshStandardMaterial({color: this.color, roughness:0.5});
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.5,1.6,12), bodyMat);
    torso.position.y = 0.8; torso.castShadow = true; torso.receiveShadow = true;
    this.model.add(torso);
    
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.35,16,16), new THREE.MeshStandardMaterial({color:0xffdbac, roughness:0.4}));
    head.position.y = 1.8; head.castShadow = true;
    this.model.add(head);
    
    this.model.position.copy(this.startPos);
    scene.add(this.model);
  }

  loadFBX() {
    const loader = new FBXLoader();
    loader.load(FILES[this.name.toLowerCase()].idle, (fbx) => {
      // If assets sync natively, wipe structural fallbacks and replace with full rigs
      while(this.model.children.length > 0){ 
        this.model.remove(this.model.children[0]); 
      }
      fbx.scale.setScalar(0.015);
      fbx.traverse(c => { if(c.isMesh) c.castShadow = true; });
      this.model.add(fbx);
      this.mixer = new THREE.AnimationMixer(fbx);
      if(fbx.animations.length > 0) {
        this.mixer.clipAction(fbx.animations[0]).play();
      }
    }, undefined, (err) => {
      console.warn(`Asset pipeline offline for ${this.name}. Graceful fallback profile engaged.`);
    });
  }

  serialize() { return {name:this.name, color:this.color}; }
}

const athena = new Soul('Athena', 0xff4444, new THREE.Vector3(-2, 0, 0));
const echo = new Soul('Echo', 0x4444ff, new THREE.Vector3(2, 0, 0));

loadMemory();
statsEl.textContent = `Garden Sync: Day ${gameMemory.day}. Ready.`;

// CHAT SIMULATION AUTOMATION
const conversationPool = [
  {who: 'athena', txt: "System sync complete. The garden structures are stable today."},
  {who: 'echo', txt: "Agreed. I am tracking a mild humidity shift near the pond."},
  {who: 'athena', txt: "We should monitor it. Let's draft a report entry in the log."},
  {who: 'echo', txt: "Saved. I am analyzing the token pools for additional construction parameters."}
];
let talkIdx = 0;
setInterval(() => {
  const line = conversationPool[talkIdx % conversationPool.length];
  addChat(line.txt, line.who.toLowerCase());
  addJournal(`Dialogue recorded: "${line.txt}"`, line.who);
  talkIdx++;
}, 6000);

// UI PANEL EVENT HANDLERS
userInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && userInput.value.trim() !== '') {
    addChat(userInput.value, 'you');
    userInput.value = '';
  }
});
leaveMsgEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && leaveMsgEl.value.trim() !== '') {
    gameMemory.userMessage = leaveMsgEl.value;
    saveMemory();
    addChat(`System: Your message has been saved into memory banks.`, 'system');
    leaveMsgEl.value = '';
  }
});

// MATH INTERSECTION FOR CSS BUBBLE TRACKING
const _v = new THREE.Vector3();
function updateBubblePosition(soul, elementId) {
  const el = document.getElementById(elementId);
  if (!el || el.style.display === 'none') return;

  // Track coordinates directly above the character model's localized matrix position
  _v.setFromMatrixPosition(soul.model.matrixWorld);
  _v.y += 2.3; // Space clearance above head unit

  // Projects $3D$ world data coordinates into $2D$ screen pixel dimensions
  _v.project(camera);
  const x = (_v.x * .5 + .5) * window.innerWidth;
  const y = (-(_v.y * .5) + .5) * window.innerHeight;

  el.style.left = `${x}px`;
  el.style.top = `${y}px`;
}

// EXECUTION LOOP
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  
  if (athena.mixer) athena.mixer.update(delta);
  if (echo.mixer) echo.mixer.update(delta);
  
  // Idle ambient mesh oscillations to keep fallbacks visually alive
  if(!athena.mixer) athena.model.position.y = Math.sin(Date.now() * 0.002) * 0.05;
  if(!echo.mixer) echo.model.position.y = Math.cos(Date.now() * 0.002) * 0.05;

  controls.update();
  renderer.render(scene, camera);

  // Sync the spatial location of the HTML chat layer relative to perspective views
  updateBubblePosition(athena, 'bubble-athena');
  updateBubblePosition(echo, 'bubble-echo');
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
