<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Garden – Day 9.3: Together</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  #c { width: 100%; height: 100%; display: block; }
  #ui { position: fixed; top: 10px; left: 10px; background: rgba(5,5,20,0.95); color: #e0e0ff; padding: 14px; font-family: 'Courier New', monospace; font-size: 12px; border: 1px solid #6cf; border-radius: 10px; z-index: 999; width: 440px; }
  .bubble { position: absolute; background: rgba(10,10,25,0.97); padding: 6px 12px; border-radius: 16px; font-size: 12px; border: 2px solid; transform: translate(-50%, -100%); display: none; font-weight: bold; color: #fff; z-index: 100; }
  .athena { color: #ff6b6b; border-color: #ff6b6b!important; }
  .echo { color: #6b9fff; border-color: #6b9fff!important; }
  .journal-entry { color: #ffd76b; margin: 2px 0; }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h4>Journal</h4><div id="journal" style="height:100px; overflow-y:auto;"></div>
  <h4>Chat</h4><div id="chatLog" style="height:80px; overflow-y:auto;"></div>
  <input id="userInput" placeholder="Athena come | Echo build" />
</div>

<script type="module">
import * as THREE from 'three';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);
const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
const loader = new FBXLoader();
const clock = new THREE.Clock();

class Soul {
  constructor(name, file, x) {
    this.name = name;
    this.energy = 100;
    this.lastSayTime = 0; 
    this.lastSpoken = ""; 
    this.pendingCmd = null;
    this.bubble = document.createElement('div');
    this.bubble.className = `bubble ${name.toLowerCase()}`;
    document.body.appendChild(this.bubble);
    
    this.model = new THREE.Group();
    scene.add(this.model);
    
    loader.load(file, (fbx) => {
      this.fbx = fbx;
      this.fbx.scale.set(0.01, 0.01, 0.01);
      this.model.add(this.fbx);
      this.mixer = new THREE.AnimationMixer(this.fbx);
      if(this.fbx.animations.length > 0) this.mixer.clipAction(this.fbx.animations[0]).play();
    });
  }

  say(text) {
    if (this.lastSpoken === text || Date.now() - this.lastSayTime < 8000) return;
    this.bubble.textContent = text;
    this.bubble.style.display = 'block';
    this.lastSpoken = text;
    this.lastSayTime = Date.now();
    setTimeout(() => this.bubble.style.display = 'none', 5000);
    const d = document.createElement('div');
    d.className = this.name.toLowerCase();
    d.textContent = `${this.name}: ${text}`;
    document.getElementById('chatLog').appendChild(d);
  }

  hear(cmd) { 
    this.pendingCmd = cmd; 
    this.energy = Math.min(100, this.energy + 10);
    this.say("I hear you, I'll think on that."); 
  }

  update(delta) {
    if (this.mixer) this.mixer.update(delta);
    // Logic: Energy decay
    this.energy = Math.max(0, this.energy - (delta * 0.5));
  }
}

const athena = new Soul('Athena', 'https://raw.githubusercontent.com/metaversemails/athena-body/main/athena_idle.fbx', -2);
const echo = new Soul('Echo', 'https://raw.githubusercontent.com/metaversemails/echo-body/main/echo_idle.fbx', 2);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(5, 10, 5);
scene.add(sun);

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  athena.update(delta);
  echo.update(delta);
  renderer.render(scene, camera);
}
animate();

document.getElementById('userInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && e.target.value) {
    const val = e.target.value.toLowerCase();
    if (val.includes('athena')) athena.hear(val);
    if (val.includes('echo')) echo.hear(val);
    e.target.value = '';
  }
});
</script>
</body>
</html>
