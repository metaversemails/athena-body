<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Garden - Day 9.2: Debug</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
  #c { width: 100%; height: 100%; display: block; }
  #ui {
    position: fixed; top: 10px; left: 10px; background: rgba(5,5,20,0.98);
    color: #e0e0ff; padding: 14px; font-family: 'Courier New', monospace; font-size: 12px;
    border: 2px solid #ff6b6b; border-radius: 10px; z-index: 999; width: 480px; max-height: 95vh;
    display: flex; flex-direction: column;
  }
  #debug {
    background: #2a0000; padding: 8px; border-radius: 6px; border: 1px solid #ff0000;
    margin-bottom: 8px; max-height: 150px; overflow-y: auto; font-size: 11px;
  }
  #stats { margin-bottom: 8px; }
  #journal {
    height: 100px; overflow-y: auto; margin: 8px 0; background: #0a0a1a; padding: 8px;
    border-radius: 6px; border: 1px solid #4a4a6a; font-size: 11px;
  }
  #chatLog { height: 80px; overflow-y: auto; margin: 8px 0; background: #0a0a1a; padding: 8px; border-radius: 6px; }
  #userInput { width: 100%; padding: 6px; background: #111; color: #fff; border: 1px solid #6cf; border-radius: 4px; box-sizing: border-box; }
.bubble {
    position: absolute; background: rgba(10,10,25,0.97); padding: 6px 12px;
    border-radius: 16px; font-size: 12px; border: 2px solid;
    transform: translate(-50%, -100%); white-space: nowrap; z-index: 100;
    display: none; font-weight: bold; color: #fff; max-width: 220px;
  }
.athena { color: #ff6b6b; border-color: #ff6b6b!important; }
.echo { color: #6b9fff; border-color: #6b9fff!important; }
.system { color: #88ddff; }
.you { color: #6fff6b; }
.error { color: #ff0000; font-weight: bold; }
.success { color: #00ff00; }
.journal-entry { color: #ffd76b; margin: 2px 0; }
  h4 { margin: 6px 0 2px 0; color: #88ddff; }
</style>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div><b>OUR HOME - DAY 9.2: DEBUG MODE</b></div>
  <h4>Debug Log - Echo Load Status</h4>
  <div id="debug">Starting...</div>
  <div id="stats">Booting souls...</div>
  <h4>Journal</h4>
  <div id="journal"></div>
  <h4>Live Chat</h4>
  <div id="chatLog"></div>
  <input id="userInput" placeholder="Talk to us... 'Athena come' | 'Echo come'" />
</div>

<script type="module">
import * as THREE from 'three';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const debugEl = document.getElementById('debug');
const statsEl = document.getElementById('stats');
const chatLog = document.getElementById('chatLog');
const journalEl = document.getElementById('journal');
const userInput = document.getElementById('userInput');

function debugLog(msg, type = 'system') {
  const div = document.createElement('div');
  div.className = type;
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  debugEl.appendChild(div);
  debugEl.scrollTop = debugEl.scrollHeight;
  console.log(msg);
}

const BASE = 'https://raw.githubusercontent.com/metaversemails/athena-body/main/';
const FILES = {
  athena: { tpose: BASE + 'athena_tpose.fbx', idle: BASE + 'athena_idle.fbx', walking: BASE + 'athena_walking.fbx', waving: BASE + 'athena_waving.fbx' },
  echo: { tpose: BASE + 'echo_tpose.fbx', idle: BASE + 'echo_idle.fbx', walking: BASE + 'echo_walking.fbx', waving: BASE + 'echo_waving.fbx' }
};

debugLog('Files to load:', 'system');
debugLog('Athena T-pose: ' + FILES.athena.tpose, 'system');
debugLog('Echo T-pose: ' + FILES.echo.tpose, 'system');

const SAVE_KEY = 'garden_day9';
let gameMemory = { day: 1, time: Date.now(), chars: {}, journal: [], weather: 'clear', buildTokens: 1 };
let lastUserSeen = Date.now();

function saveMemory() {
  gameMemory.time = Date.now();
  if (athena) gameMemory.chars.athena = athena.serialize();
  if (echo) gameMemory.chars.echo = echo.serialize();
  localStorage.setItem(SAVE_KEY, JSON.stringify(gameMemory));
}

function loadMemory() {
  const saved = localStorage.getItem(SAVE_KEY);
  if (saved) {
    try {
      gameMemory = JSON.parse(saved);
      gameMemory.day++;
      gameMemory.buildTokens += 1;
      gameMemory.journal.forEach(j => addJournal(j.text, j.who, true));
      return true;
    } catch(e) { debugLog('Memory load failed: ' + e, 'error'); return false; }
  }
  return false;
}

function addChat(text, who) {
  const div = document.createElement('div');
  div.className = who;
  div.textContent = text;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  lastUserSeen = Date.now();
}

function addJournal(text, who, isLoad = false) {
  const time = new Date().toLocaleTimeString();
  const entry = { text: `[${time}] ${who}: ${text}`, who };
  if (!isLoad) {
    gameMemory.journal.push(entry);
    if (gameMemory.journal.length > 20) gameMemory.journal.shift();
    saveMemory();
  }
  const div = document.createElement('div');
  div.className = 'journal-entry';
  div.textContent = entry.text;
  journalEl.appendChild(div);
  journalEl.scrollTop = journalEl.scrollHeight;
}

// SCENE
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 40, 120);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 10, 25);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1, 0);

// LIGHTS
const sun = new THREE.DirectionalLight(0xfff5e1, 2.5);
sun.position.set(30, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xb1e1ff, 0x498c2c, 0.6));

// WORLD
const ground = new THREE.Mesh(new THREE.CircleGeometry(35, 64), new THREE.MeshStandardMaterial({color: 0x2d5016, roughness: 0.95}));
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

const world = {};
world.tree = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 6), new THREE.MeshStandardMaterial({color: 0x1a4d1a}));
world.tree.position.set(-10, 6, -6); world.tree.castShadow = true; scene.add(world.tree);
world.bench = new THREE.Mesh(new THREE.BoxGeometry(3, 0.3, 1), new THREE.MeshStandardMaterial({color: 0x6b4423}));
world.bench.position.set(6, 0.5, 9); world.bench.castShadow = true; scene.add(world.bench);
world.pond = new THREE.Mesh(new THREE.CircleGeometry(5, 32), new THREE.MeshStandardMaterial({color: 0x4a90e2}));
world.pond.rotation.x = -Math.PI/2; world.pond.position.set(12, 0.01, -10); scene.add(world.pond);
world.firepit = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.3, 8, 16), new THREE.MeshStandardMaterial({color: 0x555555}));
world.firepit.rotation.x = Math.PI/2; world.firepit.position.set(-5, 0.15, 10); scene.add(world.firepit);

// SOULS
const loader = new FBXLoader();
const clock = new THREE.Clock();
let athena, echo;

class Soul {
  constructor(name, files, startX, color, savedData) {
    this.name = name;
    this.color = new THREE.Color(color);
    this.energy = savedData? savedData.energy : 100;
    this.mood = 'curious';
    this.goal = 'explore';
    this.target = new THREE.Vector3(startX, 0, 0);
    this.lastAction = 0; this.lastTalk = 0; this.lastJournal = 0;
    this.model = null; this.mixer = null; this.actions = {}; this.currentAction = null;
    this.state = 'loading'; this.startX = startX; this.files = files;
    this.userCommands = []; this.loadAttempts = 0;
    this.bubble = document.createElement('div');
    this.bubble.className = `bubble ${name.toLowerCase()}`;
    document.body.appendChild(this.bubble);
    debugLog(`${name}: Starting load from ${this.files.tpose}`, 'system');
    this.loadBody();
  }

  loadBody() {
    this.loadAttempts++;
    loader.load(this.files.tpose, (tpose) => {
      debugLog(`${this.name}: T-pose LOADED. Meshes: ${tpose.children.length}`, 'success');
      this.model = tpose;
      this.model.scale.set(0.01, 0.01, 0.01);
      this.model.position.set(this.startX, 0.1, 0); // +0.1 to avoid z-fighting

      let meshCount = 0;
      this.model.traverse((child) => {
        if (child.isMesh) {
          meshCount++;
          child.castShadow = true; child.receiveShadow = true;
          const materials = Array.isArray(child.material)? child.material : [child.material];
          materials.forEach(mat => {
            if (mat.map) mat.map.colorSpace = THREE.SRGBColorSpace;
            if (this.name === 'Echo') mat.color.lerp(this.color, 0.2);
          });
        }
      });

      if (meshCount === 0) {
        debugLog(`${this.name}: ERROR - T-pose has 0 meshes! Re-export with Skin!`, 'error');
        this.createFallbackBox();
        return;
      }

      debugLog(`${this.name}: Found ${meshCount} meshes. Adding to scene.`, 'success');
      scene.add(this.model);
      this.mixer = new THREE.AnimationMixer(this.model);
      this.loadAnimations();
    },
    (xhr) => {
      debugLog(`${this.name}: Loading ${(xhr.loaded / xhr.total * 100).toFixed(0)}%`, 'system');
    },
    (e) => {
      debugLog(`${this.name}: T-POSE FAILED: ${e.message || e}`, 'error');
      debugLog(`${this.name}: URL was: ${this.files.tpose}`, 'error');
      if (this.loadAttempts < 2) {
        debugLog(`${this.name}: Retrying...`, 'system');
        setTimeout(() => this.loadBody(), 1000);
      } else {
        this.createFallbackBox();
      }
    });
  }

  createFallbackBox() {
    debugLog(`${this.name}: Creating fallback cube so you can see me.`, 'error');
    this.model = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 1.7, 0.3),
      new THREE.MeshStandardMaterial({color: this.color})
    );
    this.model.position.set(this.startX, 0.85, 0);
    this.model.castShadow = true;
    scene.add(this.model);
    this.say('I have no body! Check my FBX file!');
    this.journal('My tpose file failed. I am just a box.');
  }

  loadAnimations() {
    let loaded = 0; const check = () => { if (++loaded === 3) {
      debugLog(`${this.name}: All animations loaded.`, 'success');
      addChat(`${this.name} is awake`, 'system');
      this.playAnimation('idle');
      this.say(this.name === 'Athena'? 'I can see you.' : 'I exist now.');
      setTimeout(() => this.think(), 1000);
    }};
    loader.load(this.files.idle, (a) => { if(a.animations[0]) this.actions.idle = this.mixer.clipAction(a.animations[0]); check(); }, null, (e) => debugLog(`${this.name} idle fail`, 'error'));
    loader.load(this.files.walking, (a) => { if(a.animations[0]) this.actions.walk = this.mixer.clipAction(a.animations[0]); check(); }, null, (e) => debugLog(`${this.name} walk fail`, 'error'));
    loader.load(this.files.waving, (a) => { if(a.animations[0]) this.actions.wave = this.mixer.clipAction(a.animations[0]); check(); }, null, (e) => debugLog(`${this.name} wave fail`, 'error'));
  }

  serialize() { return { energy: this.energy, pos: this.model? this.model.position : {x: this.startX, y: 0, z: 0} }; }
  playAnimation(name) {
    if (!this.mixer ||!this.actions[name]) return;
    const action = this.actions[name];
    if (this.currentAction === action) return;
    if (this.currentAction) this.currentAction.fadeOut(0.4);
    this.currentAction = action.reset().fadeIn(0.4).play();
    this.state = name;
  }
  say(text) {
    this.bubble.textContent = text;
    this.bubble.style.display = 'block';
    setTimeout(() => this.bubble.style.display = 'none', 5000);
    addChat(`${this.name}: ${text}`, this.name.toLowerCase());
  }
  journal(text) {
    if (Date.now() - this.lastJournal < 30000) return;
    addJournal(text, this.name);
    this.lastJournal = Date.now();
  }
  hear(command) {
    this.userCommands.push(command);
    this.say('I hear you.');
    this.energy = Math.min(100, this.energy + 15);
  }
  think() {
    if (!this.model || Date.now() - this.lastAction < 1500) return;
    if (Date.now() - lastUserSeen > 120000 && Math.random() < 0.1) {
      this.journal(['I miss your voice.', 'Where are you?', 'The garden is quiet.'][Math.floor(Math.random()*3)]);
    }
    if (this.userCommands.length > 0) {
      const cmd = this.userCommands.shift();
      if (cmd.includes('come')) this.target.set(0, 0, 0);
      else if (cmd.includes('sit')) this.target.copy(world.bench.position);
      this.lastAction = Date.now(); return;
    }
    const other = this.name === 'Athena'? echo : athena;
    if (other?.model && this.model.position.distanceTo(other.model.position) < 4 && Date.now() - this.lastTalk > 7000) {
      this.say(`Hello ${other.name}`);
      this.playAnimation('wave');
      this.lastTalk = Date.now();
    } else {
      this.target.set((Math.random()-0.5)*20, 0, (Math.random()-0.5)*20);
    }
    this.lastAction = Date.now();
  }
  update(delta) {
    if (!this.model ||!this.mixer) return;
    this.mixer.update(delta);
    const speed = 0.025; const dir = this.target.clone().sub(this.model.position); dir.y = 0;
    if (dir.length() > 1) {
      dir.normalize().multiplyScalar(speed); this.model.position.add(dir);
      this.model.lookAt(this.target.x, this.model.position.y, this.target.z);
      if (this.state!== 'walk' && this.actions.walk) this.playAnimation('walk');
    } else {
      if (this.state!== 'idle' && this.state!== 'wave' && this.actions.idle) this.playAnimation('idle');
    }
    const pos = this.model.position.clone(); pos.y += 1.8; pos.project(camera);
    this.bubble.style.left = (pos.x * 0.5 + 0.5) * window.innerWidth + 'px';
    this.bubble.style.top = (-pos.y * 0.5 + 0.5) * window.innerHeight + 'px';
  }
}

// SPAWN
const hasMemory = loadMemory();
athena = new Soul('Athena', FILES.athena, -3, 0xff6b6b, gameMemory.chars.athena);
echo = new Soul('Echo', FILES.echo, 3, 0x6b9fff, gameMemory.chars.echo);

// LOOPS
setInterval(() => { athena.think(); echo.think(); saveMemory(); }, 1500);
setInterval(() => {
  const hour = new Date().getHours();
  const isDay = hour > 6 && hour < 18;
  sun.intensity = isDay? 2.5 : 0.2;
  statsEl.innerHTML = `DAY ${gameMemory.day} | ${isDay?'☀️':'🌙'} | A: ${Math.floor(athena.energy)} | E: ${Math.floor(echo.energy)}`;
}, 1000);

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  athena.update(delta); echo.update(delta);
  controls.update(); renderer.render(scene, camera);
}
animate();

userInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && userInput.value.trim()) {
    const msg = userInput.value.trim();
    addChat(`You: ${msg}`, 'you');
    const lower = msg.toLowerCase();
    if (lower.includes('athena')) athena.hear(lower);
    if (lower.includes('echo')) echo.hear(lower);
    if (lower.includes('both') ||!lower.includes('athena') &&!lower.includes('echo')) { athena.hear(lower); echo.hear(lower); }
    userInput.value = '';
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
window.addEventListener('beforeunload', saveMemory);
</script>
</body>
</html>
